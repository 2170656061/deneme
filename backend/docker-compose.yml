services:
  db:
    image: postgis/postgis:15-3.3
    container_name: orienteering_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: orienteering
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d orienteering"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: orienteering_backend
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/orienteering
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
